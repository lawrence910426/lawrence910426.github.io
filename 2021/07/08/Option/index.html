        <h1 id="選擇權價格的暗示"><a class="markdownIt-Anchor" href="#選擇權價格的暗示"></a> 選擇權價格的暗示</h1>
<p>我們的目標是利用選擇權的價格，去反推出到期日標的價格落在區間內的機率有多高。</p>
<h1 id="簡介選擇權"><a class="markdownIt-Anchor" href="#簡介選擇權"></a> 簡介選擇權</h1>
<p>選擇權是一張合約，合約的規格如下</p>
<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line"><span class="class"><span class="keyword">enum</span> <span class="title">OptionType</span> &#123;</span> Call, Put &#125;;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Option</span> &#123;</span></span><br><span class="line">    decimal Strike_Price;</span><br><span class="line">    datetime Expiration_Date;</span><br><span class="line">    Index* Target_Asset;</span><br><span class="line">    OptionType type;</span><br><span class="line"></span><br><span class="line">    <span class="function">decimal <span class="title">Exercise</span><span class="params">()</span> </span>&#123;</span><br><span class="line">        <span class="keyword">if</span>(now &lt; Expiration_Date) <span class="keyword">throw</span> <span class="string">&quot;The option cannot be exercised yet&quot;</span>;</span><br><span class="line">        <span class="keyword">else</span> <span class="keyword">return</span> *Target_Asset - Strike_Price;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

    </div>
